<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">TravelAgent repository architecture</title>
  <desc id="desc">Latest layered repository architecture showing delivery, application, domain contracts, infrastructure adapters, the optional MCP sidecar, and external providers.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .bandTitle { font: 700 15px "Segoe UI", Arial, sans-serif; }
      .band { rx: 16; ry: 16; stroke-width: 2; }
      .band1 { fill: #fff7ed; stroke: #fdba74; }
      .band2 { fill: #fff4ec; stroke: #fb923c; }
      .band3 { fill: #eff6ff; stroke: #60a5fa; }
      .band4 { fill: #f0fdf4; stroke: #4ade80; }
      .externalBand { fill: #ffffff; stroke: #cbd5e1; }
      .card { fill: #ffffff; rx: 12; ry: 12; stroke-width: 2; }
      .l1 { stroke: #fb923c; }
      .l2 { stroke: #f97316; }
      .l3 { stroke: #3b82f6; }
      .l4 { stroke: #22c55e; }
      .ext { stroke: #94a3b8; }
      .optional { stroke-dasharray: 8 6; }
      .cardHead { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .cardText { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .note { font: 400 11px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .edgeLabel { font: 400 11px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrowDashed { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 5; marker-end: url(#arrowDashed); }
    </style>
  </defs>

  <text x="40" y="42" class="title">TravelAgent Repository Architecture</text>
  <text x="40" y="68" class="subtitle">Latest module boundaries, adapters, sidecars, and runtime switches</text>

  <rect x="40" y="95" width="1140" height="150" class="band band1"/>
  <rect x="40" y="270" width="1140" height="150" class="band band2"/>
  <rect x="40" y="445" width="1140" height="180" class="band band3"/>
  <rect x="40" y="650" width="1140" height="220" class="band band4"/>
  <rect x="1210" y="95" width="350" height="775" class="band externalBand"/>

  <text x="58" y="120" class="bandTitle" fill="#9a3412">L1 Access / Delivery</text>
  <text x="58" y="295" class="bandTitle" fill="#9a3412">L2 Application Orchestration</text>
  <text x="58" y="470" class="bandTitle" fill="#1e3a8a">L3 Domain Contracts</text>
  <text x="58" y="675" class="bandTitle" fill="#14532d">L4 Infrastructure / Integration</text>
  <text x="1228" y="120" class="bandTitle" fill="#334155">External Systems</text>

  <rect x="80" y="145" width="180" height="72" class="card l1"/>
  <text x="170" y="170" text-anchor="middle" class="cardHead">Traveler</text>
  <text x="170" y="188" text-anchor="middle" class="cardText">chat intent / image / feedback</text>

  <rect x="320" y="132" width="250" height="94" class="card l1"/>
  <text x="445" y="158" text-anchor="middle" class="cardHead">web</text>
  <text x="445" y="176" text-anchor="middle" class="cardText">Vue workspace with chat, plan, map,</text>
  <text x="445" y="194" text-anchor="middle" class="cardText">timeline, image intake, and feedback</text>

  <rect x="620" y="145" width="240" height="72" class="card l1"/>
  <text x="740" y="170" text-anchor="middle" class="cardHead">travel-agent-types</text>
  <text x="740" y="188" text-anchor="middle" class="cardText">shared DTOs, envelopes, and errors</text>

  <rect x="260" y="305" width="620" height="100" class="card l2"/>
  <text x="570" y="331" text-anchor="middle" class="cardHead">travel-agent-app</text>
  <text x="570" y="349" text-anchor="middle" class="cardText">ConversationController / ConversationApplicationService</text>
  <text x="570" y="367" text-anchor="middle" class="cardText">ConversationWorkflow / ConversationStreamHub / ReactiveTimelinePublisher</text>
  <text x="570" y="385" text-anchor="middle" class="cardText">health indicators and TravelKnowledgeSeedRunner</text>

  <rect x="220" y="475" width="700" height="116" class="card l3"/>
  <text x="570" y="501" text-anchor="middle" class="cardHead">travel-agent-domain</text>
  <text x="570" y="519" text-anchor="middle" class="cardText">entities + value objects</text>
  <text x="570" y="537" text-anchor="middle" class="cardText">ports: AgentRouter / SpecialistAgent / TaskMemoryExtractor</text>
  <text x="570" y="555" text-anchor="middle" class="cardText">ports: ConversationSummarizer / ImageAttachmentInterpreter / AmapGateway</text>
  <text x="570" y="573" text-anchor="middle" class="cardText">repositories: Conversation / LongTermMemory / TravelKnowledge / TimelinePublisher</text>

  <rect x="110" y="690" width="510" height="140" class="card l4"/>
  <text x="365" y="716" text-anchor="middle" class="cardHead">travel-agent-infrastructure</text>
  <text x="365" y="734" text-anchor="middle" class="cardText">OpenAI router + Weather / Geo / General / Planner agents</text>
  <text x="365" y="752" text-anchor="middle" class="cardText">image interpreter, summarizer, task memory extractor</text>
  <text x="365" y="770" text-anchor="middle" class="cardText">routing memory + knowledge repositories, validators, repairers</text>
  <text x="365" y="788" text-anchor="middle" class="cardText">AmapToolCallbackConfig, AmapTravelTools, and AmapMcpGateway</text>

  <rect x="670" y="708" width="210" height="96" class="card l4"/>
  <text x="775" y="734" text-anchor="middle" class="cardHead">travel-agent-amap</text>
  <text x="775" y="752" text-anchor="middle" class="cardText">AmapHttpGateway</text>
  <text x="775" y="770" text-anchor="middle" class="cardText">HTTP adapter for Amap OpenAPI</text>

  <rect x="930" y="708" width="210" height="96" class="card l4 optional"/>
  <text x="1035" y="734" text-anchor="middle" class="cardHead">travel-agent-amap-mcp-server</text>
  <text x="1035" y="752" text-anchor="middle" class="cardText">standalone MCP tool server</text>
  <text x="1035" y="770" text-anchor="middle" class="cardText">optional sidecar process</text>

  <rect x="1250" y="145" width="270" height="82" class="card ext"/>
  <text x="1385" y="171" text-anchor="middle" class="cardHead">OpenAI-compatible provider</text>
  <text x="1385" y="189" text-anchor="middle" class="cardText">chat completions + embeddings</text>

  <rect x="1250" y="255" width="270" height="82" class="card ext"/>
  <text x="1385" y="281" text-anchor="middle" class="cardHead">SQLite</text>
  <text x="1385" y="299" text-anchor="middle" class="cardText">conversations, timeline, task memory,</text>
  <text x="1385" y="317" text-anchor="middle" class="cardText">plans, feedback, pending image context</text>

  <rect x="1250" y="365" width="270" height="82" class="card ext"/>
  <text x="1385" y="391" text-anchor="middle" class="cardHead">Local travel knowledge JSON</text>
  <text x="1385" y="409" text-anchor="middle" class="cardText">curated hints and canonical destination data</text>

  <rect x="1250" y="475" width="270" height="82" class="card ext optional"/>
  <text x="1385" y="501" text-anchor="middle" class="cardHead">Milvus (optional)</text>
  <text x="1385" y="519" text-anchor="middle" class="cardText">vector memory and vector knowledge</text>

  <rect x="1250" y="585" width="270" height="82" class="card ext"/>
  <text x="1385" y="611" text-anchor="middle" class="cardHead">Amap OpenAPI</text>
  <text x="1385" y="629" text-anchor="middle" class="cardText">weather, geocode, input tips, transit route</text>

  <text x="220" y="855" class="note">Runtime switches: tool-provider = LOCAL or MCP, memory-provider = AUTO or SQLITE or MILVUS</text>
  <text x="220" y="875" class="note">Knowledge retrieval prefers the vector store when enabled, then falls back to the local JSON dataset.</text>

  <path d="M 260 181 L 320 181" class="arrow"/>
  <text x="274" y="171" class="edgeLabel">user input</text>

  <path d="M 570 182 L 620 182" class="arrow"/>
  <text x="580" y="171" class="edgeLabel">shared DTOs</text>

  <path d="M 445 226 L 445 305" class="arrow"/>
  <text x="455" y="270" class="edgeLabel">REST + uploads</text>

  <path d="M 520 305 L 520 245 L 390 245 L 390 226" class="arrowDashed"/>
  <text x="408" y="239" class="edgeLabel">detail + SSE</text>

  <path d="M 570 405 L 570 475" class="arrow"/>
  <text x="580" y="445" class="edgeLabel">orchestrate</text>

  <path d="M 570 591 L 570 690 L 520 690" class="arrow"/>
  <text x="582" y="650" class="edgeLabel">ports</text>

  <path d="M 620 742 L 670 742" class="arrow"/>
  <text x="630" y="732" class="edgeLabel">AmapGateway</text>

  <path d="M 620 780 L 1250 626" class="arrow"/>
  <text x="860" y="742" class="edgeLabel">LOCAL path</text>

  <path d="M 620 726 L 1250 186" class="arrow"/>
  <text x="805" y="520" class="edgeLabel">chat + embedding</text>

  <path d="M 620 758 L 1250 296" class="arrow"/>
  <text x="845" y="610" class="edgeLabel">conversation data</text>

  <path d="M 620 790 L 1250 406" class="arrow"/>
  <text x="835" y="700" class="edgeLabel">local knowledge fallback</text>

  <path d="M 620 820 L 1250 516" class="arrowDashed"/>
  <text x="860" y="790" class="edgeLabel">optional vector</text>

  <path d="M 880 756 L 930 756" class="arrowDashed"/>
  <text x="892" y="745" class="edgeLabel">MCP tools</text>

  <path d="M 1140 756 L 1250 626" class="arrowDashed"/>
  <text x="1150" y="700" class="edgeLabel">server tools</text>
</svg>
