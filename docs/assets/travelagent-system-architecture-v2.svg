<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="860" viewBox="0 0 1420 860" role="img" aria-label="TravelAgent layered architecture mcp redraw">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .bandTitle { font: 700 15px "Segoe UI", Arial, sans-serif; }
      .band { rx: 16; ry: 16; stroke-width: 2; }
      .band1 { fill: #fff7ed; stroke: #fdba74; }
      .band2 { fill: #fff4ec; stroke: #fb923c; }
      .band3 { fill: #eff6ff; stroke: #60a5fa; }
      .band4 { fill: #f0fdf4; stroke: #4ade80; }
      .external { fill: #ffffff; stroke: #cbd5e1; }
      .card { fill: #ffffff; rx: 12; ry: 12; stroke-width: 2; }
      .l1 { stroke: #fb923c; }
      .l2 { stroke: #f97316; }
      .l3 { stroke: #3b82f6; }
      .l4 { stroke: #22c55e; }
      .extCard { stroke: #94a3b8; }
      .optional { stroke-dasharray: 8 6; }
      .cardHead { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .cardText { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .note { font: 400 11px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .edgeLabel { font: 400 11px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrowDashed { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 5; marker-end: url(#arrowDashed); }
    </style>
  </defs>

  <text x="40" y="42" class="title">TravelAgent - Layered System Architecture (MCP redraw)</text>
  <text x="40" y="66" class="subtitle">Main flow: Traveler -&gt; Web -&gt; App -&gt; Domain ports -&gt; Infrastructure adapters</text>

  <rect x="40" y="90" width="1010" height="140" class="band band1"/>
  <rect x="40" y="250" width="1010" height="140" class="band band2"/>
  <rect x="40" y="410" width="1010" height="140" class="band band3"/>
  <rect x="40" y="570" width="1010" height="170" class="band band4"/>
  <rect x="1080" y="90" width="300" height="650" class="band external"/>

  <text x="58" y="114" class="bandTitle" fill="#9a3412">L1 Access / Delivery</text>
  <text x="58" y="274" class="bandTitle" fill="#9a3412">L2 Application Orchestration</text>
  <text x="58" y="434" class="bandTitle" fill="#1e3a8a">L3 Domain Contracts</text>
  <text x="58" y="594" class="bandTitle" fill="#14532d">L4 Infrastructure / Integration</text>
  <text x="1098" y="114" class="bandTitle" fill="#334155">External Systems</text>

  <rect x="80" y="135" width="180" height="68" class="card l1"/>
  <text x="170" y="160" text-anchor="middle" class="cardHead">Traveler</text>
  <text x="170" y="178" text-anchor="middle" class="cardText">intent / image / feedback</text>

  <rect x="310" y="125" width="230" height="86" class="card l1"/>
  <text x="425" y="150" text-anchor="middle" class="cardHead">web (Vue 3)</text>
  <text x="425" y="168" text-anchor="middle" class="cardText">ChatPanel + PlanPanel</text>
  <text x="425" y="186" text-anchor="middle" class="cardText">Timeline + FeedbackLoop</text>

  <rect x="590" y="135" width="220" height="68" class="card l1"/>
  <text x="700" y="160" text-anchor="middle" class="cardHead">travel-agent-types</text>
  <text x="700" y="178" text-anchor="middle" class="cardText">ApiResponse + AppException</text>

  <rect x="250" y="280" width="560" height="92" class="card l2"/>
  <text x="530" y="306" text-anchor="middle" class="cardHead">travel-agent-app</text>
  <text x="530" y="324" text-anchor="middle" class="cardText">ConversationController + ConversationApplicationService</text>
  <text x="530" y="342" text-anchor="middle" class="cardText">ConversationWorkflow + ReactiveTimelinePublisher</text>

  <rect x="250" y="440" width="560" height="92" class="card l3"/>
  <text x="530" y="466" text-anchor="middle" class="cardHead">travel-agent-domain</text>
  <text x="530" y="484" text-anchor="middle" class="cardText">Entities + ValueObjects</text>
  <text x="530" y="502" text-anchor="middle" class="cardText">Ports: AgentRouter / SpecialistAgent / Repositories / AmapGateway</text>

  <rect x="180" y="605" width="500" height="108" class="card l4"/>
  <text x="430" y="632" text-anchor="middle" class="cardHead">travel-agent-infrastructure</text>
  <text x="430" y="650" text-anchor="middle" class="cardText">OpenAiAgentRouter + Specialist agents</text>
  <text x="430" y="668" text-anchor="middle" class="cardText">Planner pipeline: enrich -&gt; validate -&gt; repair</text>
  <text x="430" y="686" text-anchor="middle" class="cardText">Sqlite + RoutingLongTermMemory + RoutingKnowledge</text>

  <rect x="720" y="620" width="160" height="72" class="card l4"/>
  <text x="800" y="646" text-anchor="middle" class="cardHead">travel-agent-amap</text>
  <text x="800" y="664" text-anchor="middle" class="cardText">AmapHttpGateway</text>

  <rect x="900" y="620" width="130" height="72" class="card l4 optional"/>
  <text x="965" y="646" text-anchor="middle" class="cardHead">amap-mcp-server</text>
  <text x="965" y="664" text-anchor="middle" class="cardText">optional sidecar</text>

  <rect x="1115" y="150" width="230" height="74" class="card extCard"/>
  <text x="1230" y="176" text-anchor="middle" class="cardHead">OpenAI-compatible provider</text>
  <text x="1230" y="194" text-anchor="middle" class="cardText">chat + embedding</text>

  <rect x="1115" y="260" width="230" height="74" class="card extCard"/>
  <text x="1230" y="286" text-anchor="middle" class="cardHead">SQLite</text>
  <text x="1230" y="304" text-anchor="middle" class="cardText">conversation + feedback + plan</text>

  <rect x="1115" y="370" width="230" height="74" class="card extCard optional"/>
  <text x="1230" y="396" text-anchor="middle" class="cardHead">Milvus (optional)</text>
  <text x="1230" y="414" text-anchor="middle" class="cardText">vector memory + knowledge</text>

  <rect x="1115" y="480" width="230" height="74" class="card extCard"/>
  <text x="1230" y="506" text-anchor="middle" class="cardHead">Amap OpenAPI</text>
  <text x="1230" y="524" text-anchor="middle" class="cardText">weather / geocode / route</text>

  <text x="250" y="770" class="note">Switches: tool-provider = LOCAL or MCP, memory-provider = SQLITE or MILVUS or AUTO</text>

  <path d="M 260 169 L 310 169" class="arrow"/>
  <text x="268" y="160" class="edgeLabel">chat input</text>

  <path d="M 540 168 L 590 168" class="arrow"/>
  <text x="550" y="160" class="edgeLabel">DTO</text>

  <path d="M 425 211 L 425 280" class="arrow"/>
  <text x="435" y="248" class="edgeLabel">REST</text>

  <path d="M 530 372 L 530 440" class="arrow"/>
  <text x="540" y="410" class="edgeLabel">orchestrate</text>

  <path d="M 530 532 L 530 605" class="arrow"/>
  <text x="540" y="572" class="edgeLabel">ports</text>

  <path d="M 680 659 L 720 659" class="arrow"/>
  <text x="688" y="650" class="edgeLabel">AmapGateway</text>

  <path d="M 880 656 L 900 656" class="arrowDashed"/>
  <text x="884" y="646" class="edgeLabel">MCP</text>

  <path d="M 880 620 L 1115 520" class="arrow"/>
  <text x="948" y="592" class="edgeLabel">LOCAL</text>

  <path d="M 1030 656 L 1115 520" class="arrowDashed"/>
  <text x="1050" y="598" class="edgeLabel">tools</text>

  <path d="M 680 620 L 1115 187" class="arrow"/>
  <text x="760" y="510" class="edgeLabel">chat + embedding</text>

  <path d="M 680 690 L 1115 297" class="arrow"/>
  <text x="780" y="590" class="edgeLabel">persistence</text>

  <path d="M 620 713 L 1115 407" class="arrowDashed"/>
  <text x="770" y="676" class="edgeLabel">optional vector</text>

  <path d="M 350 280 L 350 220 L 520 220" class="arrowDashed"/>
  <text x="360" y="214" class="edgeLabel">SSE timeline</text>
</svg>
