<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">TravelAgent Architecture</title>
  <desc id="desc">A C4-inspired container and module view of the TravelAgent repository, showing the web frontend, application orchestration, domain contracts, infrastructure adapters, Amap integration, optional MCP sidecar, and external systems including the language model, Amap APIs, SQLite, and Milvus.</desc>
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .legend-title { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .legend-text { font: 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-module { font: 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .box-text { font: 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .frame-runtime { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .frame-external { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .legend-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .box { stroke-width: 2; }
      .user { fill: #ffffff; stroke: #94a3b8; }
      .web { fill: #fef3c7; stroke: #d97706; }
      .types { fill: #fce7f3; stroke: #db2777; }
      .app { fill: #ffedd5; stroke: #ea580c; }
      .domain { fill: #dbeafe; stroke: #2563eb; }
      .infra { fill: #dcfce7; stroke: #16a34a; }
      .amap { fill: #ede9fe; stroke: #7c3aed; }
      .optional { fill: #f5f3ff; stroke: #7c3aed; stroke-dasharray: 8 6; }
      .external { fill: #ffffff; stroke: #94a3b8; }
      .cyl-top { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .cyl-body { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .cyl-optional { stroke-dasharray: 8 6; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke-dasharray: 8 6; }
      .label { font: 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569" />
    </marker>
  </defs>

  <text x="40" y="62" class="title">TravelAgent Architecture</text>
  <text x="40" y="88" class="subtitle">C4-inspired container / module view for the current repository</text>

  <rect x="1120" y="42" width="240" height="74" rx="18" class="legend-box" />
  <text x="1138" y="66" class="legend-title">Legend</text>
  <text x="1138" y="88" class="legend-text">Solid box: in-repo runtime module</text>
  <text x="1138" y="104" class="legend-text">Dashed box: optional path</text>
  <text x="1138" y="120" class="legend-text">Data stores: persisted state</text>

  <rect x="220" y="120" width="760" height="720" rx="24" class="frame-runtime" />
  <text x="246" y="150" class="section">TravelAgent Repository / Runtime Boundary</text>

  <rect x="1010" y="120" width="350" height="720" rx="24" class="frame-external" />
  <text x="1036" y="150" class="section">External Systems</text>

  <rect x="40" y="310" width="150" height="116" rx="18" class="box user" />
  <text x="58" y="340" class="box-title">Traveler</text>
  <text x="58" y="362" class="box-module">Browser / chat user</text>
  <text x="58" y="390" class="box-text">
    <tspan x="58" dy="0">Starts planning</tspan>
    <tspan x="58" dy="22">Reviews itinerary</tspan>
    <tspan x="58" dy="22">Sends feedback</tspan>
  </text>

  <rect x="260" y="190" width="250" height="136" rx="18" class="box web" />
  <text x="280" y="220" class="box-title">Web Frontend</text>
  <text x="280" y="242" class="box-module">module: web</text>
  <text x="280" y="274" class="box-text">
    <tspan x="280" dy="0">Vue 3 workspace</tspan>
    <tspan x="280" dy="24">Chat + plan panel</tspan>
    <tspan x="280" dy="24">Timeline + feedback UI</tspan>
  </text>

  <rect x="260" y="370" width="250" height="110" rx="18" class="box types" />
  <text x="280" y="400" class="box-title">Shared Types</text>
  <text x="280" y="422" class="box-module">module: travel-agent-types</text>
  <text x="280" y="448" class="box-text">
    <tspan x="280" dy="0">Response envelope</tspan>
    <tspan x="280" dy="22">Error codes</tspan>
    <tspan x="280" dy="22">Transport contracts</tspan>
  </text>

  <rect x="540" y="182" width="230" height="168" rx="18" class="box app" />
  <text x="560" y="212" class="box-title">Application Orchestrator</text>
  <text x="560" y="234" class="box-module">module: travel-agent-app</text>
  <text x="560" y="266" class="box-text">
    <tspan x="560" dy="0">REST API + SSE</tspan>
    <tspan x="560" dy="24">ConversationWorkflow</tspan>
    <tspan x="560" dy="24">AgentRouter</tspan>
    <tspan x="560" dy="24">TimelinePublisher</tspan>
  </text>

  <rect x="540" y="390" width="230" height="122" rx="18" class="box domain" />
  <text x="560" y="420" class="box-title">Domain Contracts</text>
  <text x="560" y="442" class="box-module">module: travel-agent-domain</text>
  <text x="560" y="470" class="box-text">
    <tspan x="560" dy="0">Entities + value objects</tspan>
    <tspan x="560" dy="22">Repository ports</tspan>
    <tspan x="560" dy="22">Gateway / service contracts</tspan>
  </text>

  <rect x="540" y="560" width="230" height="180" rx="18" class="box infra" />
  <text x="560" y="590" class="box-title">Infrastructure Adapters</text>
  <text x="560" y="612" class="box-module">module: travel-agent-infrastructure</text>
  <text x="560" y="642" class="box-text">
    <tspan x="560" dy="0">Specialist agents</tspan>
    <tspan x="560" dy="24">RAG + enrichment</tspan>
    <tspan x="560" dy="24">Validation + repair</tspan>
    <tspan x="560" dy="24">SQLite / Milvus implementations</tspan>
  </text>

  <rect x="800" y="390" width="150" height="122" rx="18" class="box amap" />
  <text x="818" y="420" class="box-title">Amap Gateway</text>
  <text x="818" y="442" class="box-module">module: travel-agent-amap</text>
  <text x="818" y="470" class="box-text">
    <tspan x="818" dy="0">HTTP adapter</tspan>
    <tspan x="818" dy="22">Map, weather, geo APIs</tspan>
  </text>

  <rect x="800" y="560" width="150" height="132" rx="18" class="box optional" />
  <text x="816" y="588" class="box-title" font-size="16">Optional MCP Sidecar</text>
  <text x="816" y="610" class="box-module">module: travel-agent-amap-mcp-server</text>
  <text x="816" y="638" class="box-text">
    <tspan x="816" dy="0">Exposes Amap-backed tools</tspan>
    <tspan x="816" dy="22">for MCP mode</tspan>
  </text>

  <rect x="1050" y="190" width="270" height="106" rx="18" class="box external" />
  <text x="1070" y="220" class="box-title">OpenAI-Compatible LLM</text>
  <text x="1070" y="254" class="box-text">
    <tspan x="1070" dy="0">Chat model</tspan>
    <tspan x="1070" dy="24">Embedding model</tspan>
  </text>

  <rect x="1050" y="360" width="270" height="122" rx="18" class="box external" />
  <text x="1070" y="390" class="box-title">Amap / Gaode APIs</text>
  <text x="1070" y="426" class="box-text">
    <tspan x="1070" dy="0">Weather</tspan>
    <tspan x="1070" dy="24">POI / routing</tspan>
    <tspan x="1070" dy="24">Geocoding</tspan>
  </text>

  <ellipse cx="1110" cy="570" rx="60" ry="12" class="cyl-top" />
  <rect x="1050" y="570" width="120" height="88" class="cyl-body" />
  <ellipse cx="1110" cy="658" rx="60" ry="12" class="cyl-top" />
  <text x="1080" y="600" class="box-title">SQLite</text>
  <text x="1070" y="630" class="box-text">
    <tspan x="1070" dy="0">Conversations</tspan>
    <tspan x="1070" dy="20">Memory</tspan>
    <tspan x="1070" dy="20">Feedback</tspan>
  </text>

  <ellipse cx="1260" cy="570" rx="60" ry="12" class="cyl-top cyl-optional" />
  <rect x="1200" y="570" width="120" height="88" class="cyl-body cyl-optional" />
  <ellipse cx="1260" cy="658" rx="60" ry="12" class="cyl-top cyl-optional" />
  <text x="1228" y="600" class="box-title">Milvus</text>
  <text x="1214" y="630" class="box-text">
    <tspan x="1214" dy="0">Optional vector</tspan>
    <tspan x="1214" dy="20">search store</tspan>
  </text>

  <path d="M 190 368 L 260 368 L 260 258" class="arrow" />
  <text x="188" y="348" class="label">chat UI</text>

  <path d="M 510 258 L 540 258" class="arrow" />
  <text x="520" y="246" class="label">HTTP + uploads</text>

  <path d="M 540 316 L 520 316 L 520 302 L 510 302" class="arrow" />
  <text x="516" y="334" class="label">SSE + plan responses</text>

  <path d="M 540 336 L 520 336 L 520 425 L 510 425" class="arrow" />
  <text x="392" y="360" class="label">response envelope</text>

  <path d="M 655 350 L 655 390" class="arrow" />
  <text x="674" y="374" class="label">use cases + routing</text>

  <path d="M 655 512 L 655 560" class="arrow" />
  <text x="674" y="542" class="label">invoke adapters</text>

  <path d="M 770 650 L 790 650 L 790 451 L 800 451" class="arrow" />
  <text x="746" y="624" class="label">map adapter</text>

  <path d="M 770 620 L 790 620 L 790 626 L 800 626" class="arrow arrow-dashed" />
  <text x="700" y="606" class="label">optional MCP mode</text>

  <path d="M 655 560 L 655 512" class="arrow" />
  <text x="674" y="586" class="label">implements ports</text>

  <path d="M 770 600 L 900 600 L 900 243 L 1050 243" class="arrow" />
  <text x="908" y="228" class="label">chat + embeddings</text>

  <path d="M 950 451 L 995 451 L 995 421 L 1050 421" class="arrow" />
  <text x="990" y="438" class="label">HTTP calls</text>

  <path d="M 950 626 L 990 626 L 990 440 L 1050 440" class="arrow arrow-dashed" />
  <text x="986" y="610" class="label">tool execution</text>

  <path d="M 770 680 L 905 680 L 905 614 L 1050 614" class="arrow" />
  <text x="912" y="668" class="label">persist state</text>

  <path d="M 770 710 L 935 710 L 935 614 L 1200 614" class="arrow arrow-dashed" />
  <text x="940" y="728" class="label">optional vector search</text>
</svg>
