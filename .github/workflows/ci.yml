name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw -B test

  quality-replay:
    runs-on: ubuntu-latest
    needs: backend
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Package backend for local-demo replay
        run: ./mvnw -B -pl travel-agent-app -am -DskipTests package

      - name: Start local-demo app
        run: |
          mkdir -p logs/runtime data/exports/quality-reports
          java -jar travel-agent-app/target/travel-agent-app.jar \
            --spring.profiles.active=local-demo \
            --server.port=18080 \
            > logs/runtime/quality-replay-app.log 2>&1 &
          echo $! > travel-agent-app.pid

      - name: Wait for app health
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:18080/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "TravelAgent local-demo did not become healthy in time." >&2
          tail -n 200 logs/runtime/quality-replay-app.log || true
          exit 1

      - name: Run quality scenario replay
        run: |
          python3 scripts/run_quality_scenarios.py \
            --base-url http://127.0.0.1:18080 \
            --output-dir data/exports/quality-reports

      - name: Stop local-demo app
        if: always()
        run: |
          if [ -f travel-agent-app.pid ]; then
            kill "$(cat travel-agent-app.pid)" || true
            wait "$(cat travel-agent-app.pid)" 2>/dev/null || true
          fi

      - name: Print app log on failure
        if: failure()
        run: tail -n 200 logs/runtime/quality-replay-app.log || true

      - name: Upload quality replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-replay-artifacts
          path: |
            data/exports/quality-reports/
            logs/runtime/quality-replay-app.log

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
